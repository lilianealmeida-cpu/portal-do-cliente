<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Briefing — Liliane Almeida Arquitetura &amp; Interiores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --terra:#C1440E; --terra-soft:#E8D5C9; --off:#FAF7F2; --ink:#2A2624;
  --grey:#8A817A; --line:#E5DDD3; --ok:#3E7C4F;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--off);color:var(--ink);line-height:1.55;font-size:16px}
.serif{font-family:'Cormorant Garamond',serif}

/* ---------- shell ---------- */
#app{min-height:100dvh;display:flex;flex-direction:column}
header.bar{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);background:var(--off);position:sticky;top:0;z-index:10}
.mono{font-family:'Cormorant Garamond',serif;font-size:26px;letter-spacing:.04em;font-weight:600}
.mono .a{color:var(--terra)}
.bar small{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--grey)}
#progressWrap{height:3px;background:var(--line)}
#progressBar{height:100%;width:0%;background:var(--terra);transition:width .4s ease}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:34px 22px 110px}
.step{width:100%;max-width:640px;animation:fadeUp .45s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--terra);margin-bottom:14px;font-weight:500}
h1{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(26px,4.6vw,36px);line-height:1.2;margin-bottom:10px}
.sub{color:var(--grey);font-size:15px;margin-bottom:26px}
.hint{font-size:12.5px;color:var(--grey);margin-top:10px}

/* ---------- inputs ---------- */
input[type=text],input[type=email],textarea{
  width:100%;background:transparent;border:none;border-bottom:2px solid var(--line);
  font-family:'DM Sans',sans-serif;font-size:19px;color:var(--ink);padding:10px 2px;outline:none;
  transition:border-color .25s;border-radius:0;
}
textarea{min-height:110px;resize:vertical;line-height:1.5}
input:focus,textarea:focus{border-color:var(--terra)}
::placeholder{color:#C9BFB4}

.opts{display:flex;flex-direction:column;gap:9px;max-height:52dvh;overflow-y:auto;padding-right:4px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1.5px solid var(--line);
  background:#fff;cursor:pointer;transition:all .18s;border-radius:10px;font-size:14.5px;line-height:1.4}
.opt:hover{border-color:var(--terra-soft)}
.opt.sel{border-color:var(--terra);background:#FCF4EF}
.opt .tag{flex:none;width:24px;height:24px;border:1.5px solid var(--line);border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--grey);margin-top:1px;background:var(--off)}
.opt.sel .tag{background:var(--terra);border-color:var(--terra);color:#fff}
.opt .grp{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--terra);font-weight:700;margin-bottom:2px}

/* ---------- buttons / footer ---------- */
.footer{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(to top,var(--off) 70%,transparent);
  padding:16px 22px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;z-index:9}
.footer-inner{width:100%;max-width:640px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:14px}
.btn{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;letter-spacing:.02em;border:none;cursor:pointer;
  padding:14px 30px;border-radius:999px;transition:all .2s}
.btn.primary{background:var(--terra);color:#fff}
.btn.primary:hover{background:#A63A0C;transform:translateY(-1px)}
.btn.primary:disabled{background:#D8CFC5;cursor:not-allowed;transform:none}
.btn.ghost{background:transparent;color:var(--grey);padding:14px 10px}
.btn.ghost:hover{color:var(--ink)}
.counter{font-size:12px;color:var(--grey);letter-spacing:.06em}

/* ---------- special screens ---------- */
.center{text-align:center}
.welcome-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:38px 30px;box-shadow:0 12px 40px rgba(42,38,36,.06)}
.welcome-card .mono{font-size:44px;margin-bottom:4px}
.welcome-card .studio{font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--grey);margin-bottom:26px}
.welcome-card h1{margin-bottom:16px}
.welcome-card p{font-size:15px;color:#5A524B;margin-bottom:14px;text-align:left}
.welcome-card .sign{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:var(--terra);margin-top:20px}
.planta-img{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:0 10px 32px rgba(42,38,36,.08)}
.planta-cap{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--grey);text-align:center;margin-top:12px}
.done-ico{width:72px;height:72px;border-radius:50%;background:var(--terra);color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 24px}
.lock-ico{width:72px;height:72px;border-radius:50%;background:#EFE8DF;color:var(--terra);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 24px}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--terra);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#FBEDE7;border:1px solid #EFC7B4;color:#8C3A12;padding:14px 16px;border-radius:10px;font-size:14px;margin-top:18px}

/* ---------- admin ---------- */
.admin-list{display:flex;flex-direction:column;gap:12px}
.admin-item{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px;cursor:pointer;transition:all .18s;display:flex;justify-content:space-between;align-items:center;gap:10px}
.admin-item:hover{border-color:var(--terra)}
.admin-item b{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600}
.admin-item span{font-size:12.5px;color:var(--grey)}
.qa{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin-bottom:12px}
.qa .q{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--terra);font-weight:700;margin-bottom:6px}
.qa .a{font-size:15px;white-space:pre-wrap}
.qa .a em{color:var(--grey);font-style:italic}
.admin-actions{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 26px}
.btn.small{padding:10px 20px;font-size:13.5px}
.btn.outline{background:#fff;border:1.5px solid var(--line);color:var(--ink)}
.btn.outline:hover{border-color:var(--terra);color:var(--terra)}
.btn.danger{background:#fff;border:1.5px solid #E3B7A5;color:#A63A0C}

@media print{
  header.bar,.footer,.admin-actions,#progressWrap{display:none!important}
  main{padding:0}
  body{background:#fff}
}
@media(max-width:480px){
  .opts{max-height:48dvh}
  .btn.primary{padding:13px 24px}
}
</style>
</head>
<body>
<div id="app">
  <header class="bar">
    <div class="mono">L<span class="a">A</span></div>
    <small>Briefing · Etapa 1</small>
  </header>
  <div id="progressWrap"><div id="progressBar"></div></div>
  <main id="main"></main>
  <div class="footer" id="footer" style="display:none">
    <div class="footer-inner">
      <button class="btn ghost" id="btnBack">← Voltar</button>
      <span class="counter" id="counter"></span>
      <button class="btn primary" id="btnNext">Avançar →</button>
    </div>
  </div>
</div>

/* ================= JSONBIN ================= */
async function binGet(){
  const r = await fetch(`https://api.jsonbin.io/v3/b/${CFG.BIN}/latest`,{headers:{'X-Master-Key':CFG.KEY}});
  if(!r.ok) throw new Error('Falha ao conectar (' + r.status + ')');
  const j = await r.json();
  return j.record || {};
}
async function binPut(record){
  const r = await fetch(`https://api.jsonbin.io/v3/b/${CFG.BIN}`,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':CFG.KEY},
    body: JSON.stringify(record)
  });
  if(!r.ok) throw new Error('Falha ao salvar (' + r.status + ')');
}

/* ================= RENDER ================= */
function setProgress(){
  const total = STEPS.length;
  const pct = Math.round((idx)/(total)*100);
  bar.style.width = pct + '%';
  counter.textContent = idx>1 ? `${idx-1} de ${total-2}` : '';
}
function render(){
  setProgress();
  const st = STEPS[idx];
  footer.style.display = 'flex';
  btnBack.style.visibility = idx===0 ? 'hidden':'visible';
  btnNext.textContent = idx===STEPS.length-1 ? 'Enviar respostas 🤍' : 'Avançar →';

  if(st.special==='welcome'){
    footer.style.display='flex'; btnNext.textContent='Começar →';
    main.innerHTML = `
    <div class="step center">
      <div class="welcome-card">
        <div class="mono">L<span class="a">A</span></div>
        <div class="studio">Liliane Almeida · Arquitetura &amp; Interiores</div>
        <h1 class="serif">Olá, ${cliente.nome}!<br>Sejam muito bem-vindos 🤍</h1>

        <p>Respondam com calma e carinho — as respostas daqui ficam registradas como referência oficial das escolhas de vocês. Depois da entrega desta etapa, mudanças nesses itens entram como alteração de projeto, tá bem?</p>
        <p>Ah, e um combinado: enquanto aguardamos as respostas, o prazo do projeto fica pausadinho e avisaremos por aqui. Assim ninguém corre e tudo sai perfeito. 😊</p>
        <div class="sign">Com carinho, Arquiteta Liliane Almeida</div>
      </div>
    </div>`;
    return;
  }
  if(st.special==='planta'){
    main.innerHTML = `
    <div class="step">
      <div class="eyebrow">Para se localizar</div>
      <h1 class="serif">A planta do apartamento de vocês</h1>
      <p class="sub">Use como referência ao responder sobre cada ambiente. Suíte 01 fica junto à sala; o Quarto 02 usa o banheiro social.</p>
      <img class="planta-img" src="data:image/png;base64,${PLANTA_B64}" alt="Planta baixa original">
      <div class="planta-cap">Planta original — sem reforma, por enquanto ✨ · Edf. Paço Decó · 100,48m²</div>
    </div>`;
    return;
  }

  const val = answers[st.id];
  let inner = `
    <div class="eyebrow">${st.sec||''}</div>
    <h1 class="serif">${st.t}${st.req?' *':''}</h1>
    ${st.s?`<p class="sub">${st.s}</p>`:''}
  `;
  if(st.type==='text'||st.type==='email'){
    inner += `<input type="${st.type==='email'?'email':'text'}" id="inp" placeholder="${st.ph||'Sua resposta...'}" value="${(val||'').replace(/"/g,'&quot;')}" autocomplete="off" autocapitalize="${st.type==='email'?'none':'sentences'}">`;
  } else if(st.type==='longtext'){
    inner += `<textarea id="inp" placeholder="Sua resposta...">${val||''}</textarea><div class="hint">Fique à vontade — quanto mais detalhes, melhor. 🤍</div>`;
  } else if(st.type==='multi'||st.type==='single'){
    const sel = st.type==='multi' ? (val||[]) : (val?[val]:[]);
    inner += `<div class="opts">` + st.opts.map((o,i)=>{
      const letter = i<26 ? String.fromCharCode(65+i) : 'A'+String.fromCharCode(65+i-26);
      const isSel = sel.includes(o);
      let label = o, grp='';
      if(o.startsWith('METAIS: ')){grp='Metais';label=o.slice(8);}
      if(o.startsWith('REVESTIMENTO: ')){grp='Revestimento';label=o.slice(14);}
      return `<div class="opt ${isSel?'sel':''}" data-v="${o.replace(/"/g,'&quot;')}"><span class="tag">${letter}</span><span>${grp?`<span class="grp">${grp}</span>`:''}${label}</span></div>`;
    }).join('') + `</div><div class="hint">${st.type==='multi'?'Selecione quantos itens desejar.':'Selecione uma opção.'}</div>`;
  } else if(st.type==='paletas'){
    inner += renderPaletas();
  }
  main.innerHTML = `<div class="step">${inner}</div>`;

  const inp = document.getElementById('inp');
  if(inp){
    inp.focus();
    inp.addEventListener('keydown', e=>{
      if(e.key==='Enter' && st.type!=='longtext'){ e.preventDefault(); next(); }
    });
  }
  main.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click', ()=>{
      const v = el.dataset.v;
      if(st.type==='single'){
        answers[st.id]=v; saveDraft();
        main.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
        el.classList.add('sel');
        setTimeout(next, 260);
      } else {
        let arr = answers[st.id]||[];
        if(arr.includes(v)) arr = arr.filter(x=>x!==v); else arr.push(v);
        answers[st.id]=arr; saveDraft();
        el.classList.toggle('sel');
      }
    });
  });
}

    {id:'c8',nome:'Branco Total & Pedra Natural',tag:'White · Calcário · Areia fina',desc:'Branco puro + calcário natural + tons de areia. O mais clean e minimalista possível. Perfeito para quem ama leveza e amplitude.',cores:['#FFFFFF','#F5F2EE','#E8E0D5','#C8B89A','#A0906E','#6B5A40'],dark:[1,1,1,1,0,0]},
    {id:'c9',nome:'Champagne & Bronze',tag:'Off-white · Dourado envelhecido · Chocolate',desc:'Off-white quente + tons champagne + bronze envelhecido + chocolate escuro. Extremamente elegante. Muito usado em apartamentos de alto padrão.',cores:['#FAF8F3','#F0EAD6','#D4BC8A','#B8956A','#7A5A38','#3D2810'],dark:[1,1,1,0,0,0]},
    {id:'c10',nome:'Azul Navy & Branco',tag:'Navy · Branco · Linho',desc:'Azul navy profundo + branco luminoso + azul médio de transição. Clássico e atemporal. Muito usado em escritórios, salas e quartos.',cores:['#FFFFFF','#E8EDF5','#B0C0D8','#4A6FA5','#1E3A6B','#0D1E3D'],dark:[1,1,1,0,0,0]},
    {id:'c11',nome:'Verde Escuro & Dourado',tag:'Verde musgo escuro · Cru · Dourado',desc:'Verde musgo escuro + cru/linho + toque dourado. Sofisticado e atual — tendência forte em 2025/2026. Combina com madeira clara e metais dourados.',cores:['#F5F2E8','#E0D8C0','#C9A84C','#5A7A4A','#2E5028','#1A3018'],dark:[1,1,1,0,0,0]},
    {id:'c12',nome:'Lilás & Bege Dourado',tag:'Lavanda · Champagne · Areia quente · Dourado',desc:'Lavanda suave + lilás médio + champagne + dourado envelhecido. Delicado, feminino e muito elegante. Perfeito para quartos, closets e ambientes românticos.',cores:['#FAF8FC','#EDE8F5','#C8B8DC','#F0E6C8','#D4B870','#8C7840'],dark:[1,1,1,1,1,0]},
    {id:'c13',nome:'Rosa Antigo & Verde Sálvia',tag:'Rosa antigo · Champagne · Verde sálvia',desc:'Rosa antigo suave + champagne quente + verde sálvia. Delicado, botânico e sofisticado — combinação incomum e especial.',cores:['#FAF8FC','#EDE8F5','#D4A8A8','#F0E6C8','#ADBFA0','#728F65'],dark:[1,1,1,1,1,0]},
  ];
  const sel=Array.isArray(answers['paletas'])?answers['paletas']:[];
  let h='<div style="display:flex;flex-direction:column;gap:10px">';
  h+='<div style="font-size:12px;color:var(--grey);margin-bottom:2px">Selecionadas: <strong id="palCnt" style="color:var(--terra)">'+sel.length+'</strong> de 3</div>';
  combos.forEach(function(c){
    const on=sel.includes(c.id);
    h+='<div class="pal-combo" data-pid="'+c.id+'" style="border:1.5px solid '+(on?'var(--terra)':'var(--line)')+';border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .2s">';
    h+='<div style="background:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--line)">';
    h+='<div><div style="font-size:13px;font-weight:500;color:var(--ink)">'+c.nome+'</div><div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--grey);margin-top:1px">'+c.tag+'</div></div>';
    h+='<div class="pal-chk" style="width:20px;height:20px;border-radius:50%;border:1.5px solid '+(on?'var(--terra)':'var(--line)')+';background:'+(on?'var(--terra)':'transparent')+';display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff">'+(on?'&#10003;':'')+'</div>';
    h+='</div><div style="display:flex;height:50px">';
    c.cores.forEach(function(cor,i){
      const tc=c.dark[i]?'rgba(0,0,0,.3)':'rgba(255,255,255,.65)';
      h+='<div style="flex:1;background:'+cor+';display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px"><span style="font-size:8px;color:'+tc+'">'+cor.replace('#','')+'</span></div>';
    });
    h+='</div><div style="padding:8px 14px;font-size:11px;color:var(--grey);line-height:1.5">'+c.desc+'</div></div>';
  });
  h+='</div>';
  setTimeout(function(){
    document.querySelectorAll('.pal-combo').forEach(function(el){
      el.addEventListener('click',function(){ togglePaleta(el.dataset.pid); });
    });
  },50);
  return h;
}
function togglePaleta(id){
  let sel=Array.isArray(answers['paletas'])?answers['paletas']:[];
  const idx2=sel.indexOf(id);
  if(idx2>=0){sel.splice(idx2,1);}else{if(sel.length>=3)return;sel.push(id);}
  answers['paletas']=sel;
  saveDraft();
  const on=sel.includes(id);
  const el=document.querySelector('.pal-combo[data-pid="'+id+'"]');
  if(!el)return;
  const chk=el.querySelector('.pal-chk');
  el.style.borderColor=on?'var(--terra)':'var(--line)';
  chk.style.background=on?'var(--terra)':'transparent';
  chk.style.borderColor=on?'var(--terra)':'var(--line)';
  chk.innerHTML=on?'&#10003;':'';
  const cnt=document.getElementById('palCnt');
  if(cnt)cnt.textContent=sel.length;
}
function collect(){
  const st = STEPS[idx];
  const inp = document.getElementById('inp');
  if(inp) answers[st.id] = inp.value.trim();
}
function saveDraft(){ try{ localStorage.setItem(LSKEY, JSON.stringify({idx,answers})); }catch(e){} }
function next(){
  const st = STEPS[idx];
  collect();
  if(st.req){
    const v = answers[st.id];
    if(!v || (st.type==='email' && !/.+@.+\..+/.test(v))){
      const inp = document.getElementById('inp');
      if(inp){ inp.style.borderColor='#C1440E'; inp.placeholder = st.type==='email'?'Precisamos de um e-mail válido 🤍':'Este campo é importante pra gente 🤍'; }
      return;
    }
  }
  saveDraft();
  if(idx === STEPS.length-1){ submit(); return; }
  idx++; render(); window.scrollTo(0,0);
}
function back(){ collect(); saveDraft(); if(idx>0){ idx--; render(); window.scrollTo(0,0);} }
btnNext.addEventListener('click', next);
btnBack.addEventListener('click', back);

/* ================= SUBMIT + LOCK ================= */
function screenMsg(html){ footer.style.display='none'; main.innerHTML = `<div class="step center">${html}</div>`; }

async function submit(){
  screenMsg(`<div class="spinner"></div><h1 class="serif">Enviando suas respostas...</h1><p class="sub">Só um instante 🤍</p>`);
  try{
    const record = await binGet();
    if(!record.briefings) record.briefings = {};
    if(record.briefings[code]){ renderLocked(); return; }
    const respostas = STEPS.filter(s=>!s.special).map(s=>({
      pergunta: s.t, secao: s.sec||'',
      resposta: Array.isArray(answers[s.id]) ? answers[s.id] : (answers[s.id]||'')
    }));
    record.briefings[code] = {
      cliente: cliente.nome, projeto: cliente.projeto,
      enviadoEm: new Date().toLocaleString('pt-BR',{timeZone:'America/Recife'}),
      respostas
    };
    await binPut(record);
    try{ localStorage.removeItem(LSKEY); }catch(e){}
    screenMsg(`
      <div class="done-ico">✓</div>
      <h1 class="serif">Respostas enviadas com sucesso 🤍</h1>
      <p class="sub">Obrigada, ${cliente.nome}! Recebemos tudo certinho.<br>
      Agora seguimos juntos para as próximas etapas do projeto.<br><br>
      <em class="serif" style="font-size:19px;color:var(--terra)">Com carinho, Arquiteta Liliane Almeida</em></p>`);
  }catch(err){
    screenMsg(`
      <h1 class="serif">Ops, não conseguimos enviar</h1>
      <p class="sub">Suas respostas estão guardadas neste aparelho — nada foi perdido.</p>
      <div class="err">${err.message}. Verifique a internet e tente novamente.</div>
      <br><button class="btn primary" onclick="submit()">Tentar enviar novamente</button>`);
  }
}
function renderLocked(){
  screenMsg(`
    <div class="lock-ico">🔒</div>
    <h1 class="serif">Briefing já enviado 🤍</h1>
    <p class="sub">Este briefing já foi respondido e está registrado com a arquiteta.<br>
    Para qualquer ajuste ou nova informação, fale diretamente com a Liliane —<br>ela cuida de tudo por lá. 😊</p>`);
}

/* ================= ADMIN ================= */
async function adminInit(){
  footer.style.display='none';
  main.innerHTML = `<div class="step" style="max-width:400px">
    <div class="eyebrow">Área da arquiteta</div>
    <h1 class="serif">Respostas dos briefings</h1>
    <p class="sub">Digite sua senha de administradora.</p>
    <input type="text" id="pw" placeholder="Senha" autocapitalize="none" autocorrect="off" autocomplete="off" style="font-size:18px">
    <br><br><button class="btn primary" id="pwbtn">Entrar</button>
    <div id="pwerr"></div>
  </div>`;
  const go = async ()=>{
    const v = (document.getElementById('pw').value||'').trim().toLowerCase();
    if(v !== CFG.ADMIN_PASS){ document.getElementById('pwerr').innerHTML = '<div class="err">Senha incorreta.</div>'; return; }
    adminList();
  };
  document.getElementById('pwbtn').addEventListener('click', go);
  document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') go(); });
}
async function adminList(){
  main.innerHTML = `<div class="step center"><div class="spinner"></div><p class="sub">Carregando respostas...</p></div>`;
  try{
    const record = await binGet();
    const briefings = record.briefings || {};
    const keys = Object.keys(briefings);
    if(!keys.length){
      main.innerHTML = `<div class="step center"><h1 class="serif">Nenhum briefing respondido ainda</h1><p class="sub">Quando um cliente enviar, aparece aqui. 🤍</p></div>`;
      return;
    }
    main.innerHTML = `<div class="step">
      <div class="eyebrow">Área da arquiteta</div>
      <h1 class="serif">Briefings respondidos</h1><br>
      <div class="admin-list">` + keys.map(k=>`
        <div class="admin-item" data-k="${k}">
          <div><b>${briefings[k].cliente}</b><br><span>${briefings[k].projeto}</span></div>
          <span>${briefings[k].enviadoEm}</span>
        </div>`).join('') + `</div></div>`;
    main.querySelectorAll('.admin-item').forEach(el=>{
      el.addEventListener('click', ()=>adminDetail(record, el.dataset.k));
    });
  }catch(err){
    main.innerHTML = `<div class="step center"><div class="err">${err.message}</div></div>`;
  }
}
function adminDetail(record, k){
  const b = record.briefings[k];
  window.scrollTo(0,0);
  main.innerHTML = `<div class="step">
    <div class="eyebrow">Briefing · ${b.enviadoEm}</div>
    <h1 class="serif">${b.cliente}</h1>
    <p class="sub">${b.projeto}</p>
    <div class="admin-actions">
      <button class="btn small outline" id="bkList">← Voltar</button>
      <button class="btn small outline" onclick="window.print()">Imprimir / salvar PDF</button>
      <button class="btn small danger" id="bkUnlock">Liberar novo envio</button>
    </div>` +
    b.respostas.map(r=>{
      const a = Array.isArray(r.resposta)
        ? (r.resposta.length ? '• ' + r.resposta.join('<br>• ') : '<em>— não marcou opções —</em>')
        : (r.resposta ? r.resposta : '<em>— sem resposta —</em>');
      return `<div class="qa"><div class="q">${r.pergunta}</div><div class="a">${a}</div></div>`;
    }).join('') + `</div>`;
  document.getElementById('bkList').addEventListener('click', adminList);
  document.getElementById('bkUnlock').addEventListener('click', async ()=>{
    if(!confirm('Liberar novo envio apaga as respostas atuais deste cliente e destrava o link dele. Confirmar?')) return;
    try{
      const fresh = await binGet();
      if(fresh.briefings) delete fresh.briefings[k];
      await binPut(fresh);
      alert('Pronto! O link do cliente está liberado para responder novamente.');
      adminList();
    }catch(err){ alert('Erro: '+err.message); }
  });
}

/* ================= BOOT ================= */
async function boot(){
  if(isAdmin){ adminInit(); return; }
  if(!cliente){
    footer.style.display='none';
    main.innerHTML = `<div class="step center" style="max-width:420px">
      <div class="mono" style="font-size:44px">L<span class="a">A</span></div>
      <h1 class="serif">Briefing exclusivo</h1>
      <p class="sub">Este briefing é acessado por um link pessoal enviado pela arquiteta.<br>Se você recebeu um código de acesso, digite abaixo:</p>
      <input type="text" id="codein" placeholder="Código de acesso" autocapitalize="none" autocorrect="off">
      <br><br><button class="btn primary" onclick="const v=(document.getElementById('codein').value||'').toLowerCase().trim(); if(v) location.search='?c='+v;">Acessar</button>
    </div>`;
    return;
  }
  screenMsg(`<div class="spinner"></div><p class="sub">Preparando seu briefing...</p>`);
  try{
    const record = await binGet();
    if(record.briefings && record.briefings[code]){ renderLocked(); return; }
  }catch(e){ /* se falhar a checagem, deixa responder — a trava final é no envio */ }
  try{
    const d = JSON.parse(localStorage.getItem(LSKEY)||'null');
    if(d && d.answers){ answers = d.answers; idx = Math.min(d.idx||0, STEPS.length-1); }
  }catch(e){}
  render();
}
boot();
</script>
