 <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Liliane Almeida Arquitetura</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brick:#C1440E;
  --brick-deep:#9B3209;
  --brick-pale:#F5E8E2;
  --ink:#1A1410;
  --ink2:#3D2E26;
  --stone:#F9F6F2;
  --stone2:#EDE8E1;
  --line:#DDD5CC;
  --line2:#C8BDB4;
  --mist:#8C7B70;
  --white:#FFFFFF;
  --green:#3A6B4F;
  --green2:#EAF2EC;
  --blue:#1E3E6E;
  --blue-pale:#EAF0FA;
  --orange:#B86820;
  --orange-pale:#FAF0E0;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--stone);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}

/* ── LOADING ── */
#vLoading{
  position:fixed;inset:0;background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;transition:opacity .5s;
}
#vLoading .logo-load{
  font-family:'Cormorant Garamond',serif;
  font-size:48px;font-weight:300;letter-spacing:12px;color:var(--white);
  animation:breathe 2s ease-in-out infinite;
}
#vLoading .sub-load{
  font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.4);margin-top:8px;text-transform:uppercase;
}
@keyframes breathe{0%,100%{opacity:.3}50%{opacity:1}}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--white);
  padding:12px 24px;border-radius:100px;
  font-size:12px;letter-spacing:.5px;
  z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;
  white-space:nowrap;
}
.toast.on{opacity:1}

/* ── LOGIN ── */
#vLogin{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--ink);padding:24px;
}
.login-wrap{width:100%;max-width:380px;text-align:center}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:300;letter-spacing:16px;color:var(--white);margin-bottom:4px}
.login-brand{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--brick);margin-bottom:4px}
.login-tagline{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:2px;margin-bottom:48px}
.login-field{position:relative;margin-bottom:16px}
.login-field input{
  width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;padding:16px 20px;outline:none;
  border-radius:12px;transition:border-color .2s;
}
.login-field input::placeholder{color:rgba(255,255,255,.3)}
.login-field input:focus{border-color:var(--brick)}
.login-btn{
  width:100%;background:var(--brick);color:var(--white);border:none;border-radius:12px;padding:16px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:1px;cursor:pointer;
  transition:background .2s;margin-top:4px;
}
.login-btn:hover{background:var(--brick-deep)}
.login-err{font-size:12px;color:#FF6B6B;margin-top:12px;opacity:0;transition:opacity .2s}
.login-err.on{opacity:1}

/* ── HEADER ── */
.hdr{
  background:var(--white);border-bottom:1px solid var(--line);
  padding:0 24px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.hdr-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;letter-spacing:8px;color:var(--ink)}
.hdr-logo span{color:var(--brick)}
.hdr-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--mist);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:12px}
.hdr-mode-badge{font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border-radius:100px;font-weight:500}
.hdr-mode-badge.admin{background:var(--brick-pale);color:var(--brick)}
.hdr-mode-badge.client{background:var(--blue-pale);color:var(--blue)}
.btn-exit{
  background:none;border:1px solid var(--line2);color:var(--mist);
  font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:1px;
  padding:7px 16px;border-radius:100px;cursor:pointer;transition:all .2s;
}
.btn-exit:hover{border-color:var(--brick);color:var(--brick)}

/* ── SYSTEM WRAPPER ── */
.sys-wrap{display:flex;min-height:calc(100vh - 60px)}

/* ── SIDEBAR ── */
.sidebar{
  width:280px;background:var(--white);border-right:1px solid var(--line);
  padding:24px 16px;flex-shrink:0;overflow-y:auto;
}
.sidebar-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--mist);margin-bottom:12px;padding:0 8px}
.cli-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;border-radius:10px;cursor:pointer;
  transition:background .15s;margin-bottom:2px;
}
.cli-item:hover{background:var(--stone)}
.cli-item.on{background:var(--brick-pale)}
.cli-av{
  width:36px;height:36px;border-radius:50%;background:var(--brick);color:var(--white);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;flex-shrink:0;
}
.cli-info{overflow:hidden}
.cli-nome{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cli-obra{font-size:11px;color:var(--mist);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-add-cli{
  width:100%;margin-top:12px;padding:10px;border:1.5px dashed var(--line2);background:none;
  border-radius:10px;color:var(--mist);font-family:'DM Sans',sans-serif;font-size:12px;
  cursor:pointer;transition:all .2s;
}
.btn-add-cli:hover{border-color:var(--brick);color:var(--brick)}

/* ── MAIN CONTENT AREA ── */
.main{flex:1;padding:32px;overflow-y:auto;max-width:1000px;margin:0 auto;width:100%}

/* ── CLIENT HERO CARD ── */
.hero-card{background:var(--white);border-radius:16px;padding:28px;margin-bottom:24px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.cli-header{display:flex;gap:16px;align-items:flex-start;margin-bottom:20px}
.cli-av-lg{
  width:56px;height:56px;border-radius:50%;background:var(--brick);color:var(--white);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;flex-shrink:0;
}
.cli-nome-lg{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;margin-bottom:2px}
.cli-obra-lg{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--brick);margin-bottom:10px}
.cli-dados{display:flex;flex-wrap:wrap;gap:12px}
.cli-dado{font-size:12px;color:var(--mist);display:flex;align-items:center;gap:6px}
.link-row{display:flex;align-items:center;gap:10px;padding-top:16px;border-top:1px solid var(--line);flex-wrap:wrap;margin-top:16px}
.link-url{
  flex:1;font-size:11px;font-family:monospace;background:var(--stone);border:1px solid var(--line);
  padding:8px 12px;border-radius:8px;color:var(--mist);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.btn-copy{
  background:var(--brick);color:var(--white);border:none;border-radius:8px;padding:8px 16px;
  font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.5px;cursor:pointer;transition:background .2s;white-space:nowrap;
}
.btn-copy:hover{background:var(--brick-deep)}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:24px;overflow-x:auto;gap:0}
.tab{
  padding:12px 18px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;background:none;border:none;
  border-bottom:2px solid transparent;color:var(--mist);font-family:'DM Sans',sans-serif;cursor:pointer;
  margin-bottom:-1px;white-space:nowrap;transition:all .2s;
}
.tab.on{color:var(--brick);border-bottom-color:var(--brick);font-weight:500}
.tab:hover{color:var(--ink)}

/* ── SECTION STRUCTS ── */
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400}
.btn-sm{
  background:none;border:1px solid var(--line2);color:var(--mist);font-family:'DM Sans',sans-serif;
  font-size:11px;letter-spacing:.5px;padding:7px 14px;border-radius:100px;cursor:pointer;transition:all .2s;
}
.btn-sm:hover{border-color:var(--brick);color:var(--brick)}
.btn-sm.primary{background:var(--brick);border-color:var(--brick);color:var(--white)}
.btn-sm.primary:hover{background:var(--brick-deep)}

/* ── TIMELINE / ETAPAS COMPLETA (ESPELHADA) ── */
.timeline-container{position:relative;padding:10px 0}
.etapa-item{display:flex;gap:20px;align-items:flex-start;padding:24px 0;border-bottom:1px solid var(--line)}
.etapa-item:last-child{border-bottom:none}
.etapa-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.etapa-circle{
  width:44px;height:44px;border-radius:50%;border:2px solid var(--line2);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;
  background:var(--white);color:var(--mist);transition:all .3s;
}
.etapa-item.concluida .etapa-circle{background:var(--green);border-color:var(--green);color:var(--white)}
.etapa-item.ativa .etapa-circle{background:var(--brick);border-color:var(--brick);color:var(--white)}
.etapa-num{font-size:10px;color:var(--mist);margin-top:6px;letter-spacing:1px;font-weight:500}

.etapa-center{flex:1}
.etapa-header-meta{display:flex;align-items:center;justify-content:between;gap:12px;margin-bottom:6px;flex-wrap:wrap}
.etapa-nome{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--ink)}
.etapa-pill{
  font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:100px;
  display:inline-block;font-weight:500;
}
.etapa-item.concluida .etapa-pill{background:var(--green2);color:var(--green);border:1px solid #C0DDC9}
.etapa-item.ativa .etapa-pill{background:var(--brick-pale);color:var(--brick);border:1px solid #EDCFC4}
.etapa-item.pendente .etapa-pill{background:var(--stone2);color:var(--mist);border:1px solid var(--line)}

.etapa-desc{font-size:13px;color:var(--mist);line-height:1.6;margin-bottom:14px}

/* Elementos Internos de Registro Técnico e Histórico */
.etapa-bloco-dados{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px}
.etapa-bloco-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mist);margin-bottom:8px;font-weight:500;display:flex;align-items:center;gap:6px}
.etapa-bloco-txt{font-size:13px;color:var(--ink2);line-height:1.7;white-space:pre-wrap}

/* ANEXOS ROBUSTOS CONTROLE VISUAL */
.anexos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:8px}
.anexo-file-card{
  background:var(--stone);border:1px solid var(--line);border-radius:10px;
  padding:12px;display:flex;flex-direction:column;justify-content:space-between;gap:10px;
}
.anexo-info{display:flex;align-items:center;gap:8px}
.anexo-icon{font-size:20px;flex-shrink:0}
.anexo-meta{overflow:hidden}
.anexo-name{font-size:12px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.anexo-type-badge{font-size:9px;color:var(--mist);text-transform:uppercase}
.anexo-actions-row{display:flex;border-top:1px solid var(--line);padding-top:8px;gap:4px;justify-content:space-between}
.anexo-action-btn{
  background:none;border:none;color:var(--brick);font-size:11px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;gap:3px;font-family:'DM Sans',sans-serif;
}
.anexo-action-btn:hover{color:var(--brick-deep);text-decoration:underline}

/* FLUXO BASE MOBILIÁRIO */
.fluxo-box{background:var(--white);border:1px solid var(--line);border-radius:12px;padding:20px;margin-top:16px}
.fluxo-title{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.fluxo-wrap{display:flex;flex-direction:column;gap:0}
.fluxo-item{display:flex;gap:14px;align-items:flex-start;padding:14px 0;position:relative}
.fluxo-item:not(:last-child)::after{content:'';position:absolute;left:15px;top:44px;bottom:0;width:2px;background:var(--line)}
.fluxo-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:2px solid var(--line);background:var(--white);color:var(--mist);z-index:1}
.fluxo-dot.verde{background:var(--green);border-color:var(--green);color:var(--white)}
.fluxo-dot.azul{background:var(--blue);border-color:var(--blue);color:var(--white)}
.fluxo-dot.laranja{background:var(--orange);border-color:var(--orange);color:var(--white)}
.fluxo-dot.pausa{background:#7A5828;border-color:#7A5828;color:var(--white)}
.fluxo-body{flex:1;padding-top:5px}
.fluxo-label{font-size:13px;font-weight:500;color:var(--ink);line-height:1.4}
.fluxo-sub{font-size:11px;color:var(--mist);margin-top:3px;line-height:1.6}
.fluxo-pill{display:inline-block;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:100px;margin-top:6px;font-weight:500}
.fluxo-pill.azul{background:var(--blue-pale);color:var(--blue);border:1px solid #C0CDE0}
.fluxo-pill.verde{background:var(--green2);color:var(--green);border:1px solid #C0DDC9}
.fluxo-pill.laranja{background:var(--orange-pale);color:var(--orange);border:1px solid #E8D5AA}

/* CAMPOS DE VALIDAÇÃO E BOTÕES DE DECISÃO */
.validacao-area{background:var(--stone);border:1px solid var(--line);border-radius:10px;padding:16px;margin-top:14px}
.validacao-status{font-size:12px;font-weight:bold;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.validacao-status.aprovado{color:var(--green)}
.validacao-status.alteracao{color:var(--orange)}
.validacao-status.pendente{color:var(--mist)}
.validacao-feedback-text{font-size:12px;color:var(--ink2);line-height:1.6;font-style:italic;background:var(--white);padding:10px;border-radius:6px;border:1px solid var(--line);margin-bottom:10px}
.client-decision-row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.btn-decision{
  padding:10px 18px;font-size:11px;font-weight:500;letter-spacing:.5px;border-radius:100px;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;border:none;
}
.btn-decision.approve{background:var(--green);color:var(--white)}
.btn-decision.approve:hover{background:#2D543E}
.btn-decision.reject{background:var(--brick);color:var(--white)}
.btn-decision.reject:hover{background:var(--brick-deep)}

/* CONTROLES EXCLUSIVOS DO ADMINISTRADOR */
.admin-actions-container{background:#FAF5ED;border:1px solid #EADECC;border-radius:12px;padding:16px;margin-top:14px}
.admin-actions-title{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:10px}
.admin-input-group{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.admin-input-group input, .admin-input-group textarea, .admin-input-group select{
  flex:1;min-width:160px;background:var(--white);border:1px solid var(--line);
  color:var(--ink);font-family:'DM Sans',sans-serif;font-size:12px;padding:8px 12px;border-radius:8px;outline:none;
}
.admin-input-group textarea{min-width:100%;resize:vertical}

/* ── ABAS DE PENDÊNCIAS / VISITAS ── */
.pend-item{
  display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--line);
  border-radius:10px;padding:14px 16px;margin-bottom:8px;
}
.pend-item.done{background:var(--stone2)}
.pend-check{
  width:20px;height:20px;border:2px solid var(--line2);border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--white);
  background:var(--white);transition:all .2s;
}
.pend-item.done .pend-check{background:var(--green);border-color:var(--green)}
.pend-txt{flex:1;font-size:13px;color:var(--ink2)}
.pend-item.done .pend-txt{color:var(--mist);text-decoration:line-through}

.visita-card{
  background:linear-gradient(135deg,var(--brick) 0%,var(--brick-deep) 100%);
  border-radius:16px;padding:28px;margin-bottom:20px;color:var(--white);
}
.visita-lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;opacity:.7;margin-bottom:8px}
.visita-data{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;margin-bottom:4px}
.visita-desc{font-size:13px;opacity:.8}

/* FORMULARIOS DE CRIACAO */
.fcard{background:var(--white);border-radius:16px;padding:32px;max-width:520px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin:20px auto}
.ftitle{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;margin-bottom:24px}
.field{margin-bottom:18px}
.field label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--brick);margin-bottom:6px}
.field input, .field textarea{
  width:100%;background:var(--stone);border:1px solid var(--line);color:var(--ink);
  font-family:'DM Sans',sans-serif;font-size:13px;padding:11px 14px;outline:none;border-radius:10px;
}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(26,20,16,.5);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);padding:20px}
.modal{background:var(--white);border-radius:16px;padding:28px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;margin-bottom:8px}
.modal-sub{font-size:13px;color:var(--mist);margin-bottom:20px;line-height:1.7}

.empty{text-align:center;padding:56px 20px;color:var(--mist)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}

@media(max-width:768px){
  .sys-wrap{flex-direction:column}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--line);max-height:220px}
  .main{padding:16px}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div id="vLoading">
  <div class="logo-load">LA</div>
  <div class="sub-load">Liliane Almeida Arquitetura</div>
</div>

<div id="vLogin" class="hidden">
  <div class="login-wrap">
    <div class="login-logo">LA</div>
    <div class="login-brand">Liliane Almeida Arquitetura & Interiores</div>
    <div class="login-tagline">Painel de Autenticação</div>
    <div class="login-field">
      <input type="password" id="lSenha" placeholder="Digite a senha de acesso..." onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="login-btn" onclick="login()">Acessar Sistema</button>
    <div class="login-err" id="lErr">Senha inválida ou link incorreto.</div>
  </div>
</div>

<div id="vSystem" class="hidden">
  <div class="hdr">
    <div>
      <div class="hdr-logo">L<span>A</span></div>
      <div class="hdr-sub">Arquitetura & Interiores</div>
    </div>
    <div class="hdr-right">
      <div id="modeBadge" class="hdr-mode-badge"></div>
      <button class="btn-exit" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="sys-wrap">
    <div class="sidebar" id="systemSidebar">
      <div class="sidebar-label">Projetos Ativos</div>
      <div id="cliList"></div>
      <button class="btn-add-cli" onclick="goNovoCliente()">+ Adicionar Cliente</button>
    </div>

    <div class="main" id="mainArea"></div>
  </div>
</div>

<div id="modalValidacao" class="overlay hidden">
  <div class="modal">
    <div class="modal-title" id="mvTitle">Validar Etapa</div>
    <div class="modal-sub" id="mvSub">Deixe as suas considerações ou observações técnicas sobre esta validação abaixo:</div>
    <div class="field">
      <textarea id="mvFeedback" rows="4" placeholder="Escreva aqui os detalhes..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-sm" onclick="fecharModalValidacao()">Cancelar</button>
      <button class="btn-sm primary" id="mvConfirmBtn" onclick="confirmarValidacaoCliente()">Salvar Decisão</button>
    </div>
  </div>
</div>

<script>

// CONTROLE DE FLUXO E LOGIN
function init(){
  const params = new URLSearchParams(window.location.search);
  const clientToken = params.get('projeto') || params.get('token');

  setTimeout(() => {
    document.getElementById('vLoading').classList.add('hidden');
    
    if(clientToken) {
      let encontrado = db.clientes.find(c => c.token === clientToken);
      if(encontrado) {
        db.currentUserMode = 'client';
        db.selectedClientId = encontrado.id;
        renderSystem();
      } else {
        showToast("Link do portal inválido.");
        exibirLogin();
      }
    } else {
      exibirLogin();
    }
  }, 1200);
}

function exibirLogin(){
  document.getElementById('vLogin').classList.remove('hidden');
}

function login(){
  let senha = document.getElementById('lSenha').value;
  if(senha === "admin123") {
    db.currentUserMode = 'admin';
    document.getElementById('vLogin').classList.add('hidden');
    renderSystem();
  } else {
    let encontrado = db.clientes.find(c => c.token === senha);
    if(encontrado) {
      db.currentUserMode = 'client';
      db.selectedClientId = encontrado.id;
      document.getElementById('vLogin').classList.add('hidden');
      renderSystem();
    } else {
      let err = document.getElementById('lErr');
      err.classList.add('on');
      setTimeout(() => err.classList.remove('on'), 3000);
    }
  }
}

function logout(){
  window.location.href = window.location.pathname;
}

function renderSystem(){
  document.getElementById('vSystem').classList.remove('hidden');
  let badge = document.getElementById('modeBadge');
  let sidebar = document.getElementById('systemSidebar');

  if(db.currentUserMode === 'admin') {
    badge.innerText = "Painel Administrativo";
    badge.className = "hdr-mode-badge admin";
    sidebar.classList.remove('hidden');
    renderSidebarList();
    if(!db.selectedClientId && db.clientes.length > 0) {
      db.selectedClientId = db.clientes[0].id;
    }
  } else {
    badge.innerText = "Portal do Cliente (Leitura)";
    badge.className = "hdr-mode-badge client";
    sidebar.classList.add('hidden');
  }

  renderMainArea();
}

function renderSidebarList(){
  let html = '';
  db.clientes.forEach(c => {
    let activeClass = (c.id === db.selectedClientId) ? 'on' : '';
    html += `
      <div class="cli-item ${activeClass}" onclick="selectCliente('${c.id}')">
        <div class="cli-av">${c.nome.charAt(0)}</div>

          <div class="cli-nome">${c.nome}</div>
          <div class="cli-obra">${c.obra}</div>
        </div>
      </div>
    `;
  });
  document.getElementById('cliList').innerHTML = html;
}

function selectCliente(id){
  db.selectedClientId = id;
  renderSidebarList();
  renderMainArea();
}

// FORMATADORES E COMPONENTES AUXILIARES
function getAnexoIcon(tipo){
  if(tipo === 'pdf') return '📕';
  if(tipo === 'imagem') return '🖼️';
  return '🔗';
}

function actionAnexo(acao, nome){
  showToast(`${acao} executado com sucesso para o arquivo: ${nome}`);
}

function renderComponenteFluxo(etapa){
  let f = etapa.fluxoEtapa || 'detalhamento';
  return `
    <div class="fluxo-box">
      <div class="fluxo-title">📐 Status Atual do Fluxo de Mobiliário Sob Medida</div>
      <div class="fluxo-wrap">
        <div class="fluxo-item">
          <div class="fluxo-dot ${f==='detalhamento'?'azul':'verde'}">1</div>
          <div class="fluxo-body">
            <div class="fluxo-label">Detalhamento Técnico (Escala 1:1 DWG)</div>
            <div class="fluxo-sub">Envio de arquivos técnicos consolidados diretamente para a fábrica para evitar erros de leitura gráfica.</div>
            ${f==='detalhamento'?'<span class="fluxo-pill azul">ETAPA ATUAL</span>':''}
          </div>
        </div>
        <div class="fluxo-item">
          <div class="fluxo-dot ${f==='alinhamento'?'azul':(f==='producao'?'verde':'cinza')}">2</div>
          <div class="fluxo-body">
            <div class="fluxo-label">Alinhamento do Orçamento & Engenharia</div>
            <div class="fluxo-sub">Validação de custos de frete, montagem e compatibilização estrutural.</div>
            ${f==='alinhamento'?'<span class="fluxo-pill azul">ETAPA ATUAL</span>':''}
          </div>
        </div>
        <div class="fluxo-item">
          <div class="fluxo-dot ${f==='producao'?'azul':'cinza'}">3</div>
          <div class="fluxo-body">
            <div class="fluxo-label">Produção Ativa em Fábrica</div>
            <div class="fluxo-sub">O mobiliário entrou na linha de corte e acabamento industrial de alta precisão.</div>
            ${f==='producao'?'<span class="fluxo-pill azul">ETAPA ATUAL</span>':''}
          </div>
        </div>
        ${f === 'pausa' ? `
          <div class="fluxo-item">
            <div class="fluxo-dot pausa">⏸</div>
            <div class="fluxo-body">
              <div class="fluxo-label">Parada Estratégica das Equipes</div>
              <div class="fluxo-sub">Aguardando a liberação de outras frentes de serviço (gesso ou pintura) para não comprometer o material.</div>
              <span class="fluxo-pill laranja">STATUS DE RETENÇÃO</span>
            </div>
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

// OPERAÇÕES DO BANCO DE DADOS (ADMINS)
function updateEtapaStatus(cliId, index, valor){
  let cli = db.clientes.find(c => c.id === cliId);
  if(cli) {
    cli.etapas[index].status = valor;
    showToast("Status da etapa atualizado.");
    renderMainArea();
  }
}

function updateEtapaTexto(cliId, index, campo, valor){
  let cli = db.clientes.find(c => c.id === cliId);
  if(cli) {
    cli.etapas[index][campo] = valor;
    showToast("Dados salvos e sincronizados.");
  }
}

function adicionarAnexoAdmin(cliId, index){
  let cli = db.clientes.find(c => c.id === cliId);
  let nome = document.getElementById(`newAnexoNome_${index}`).value;
  let tipo = document.getElementById(`newAnexoTipo_${index}`).value;
  
  if(!nome) { showToast("Digite um nome para o arquivo."); return; }
  
  cli.etapas[index].anexos.push({ nome: nome, tipo: tipo, url: "#" });
  showToast("Novo arquivo anexado! Sincronizado com o portal.");
  renderMainArea();
}

function toggleFluxoMobiliario(cliId, index, checked){
  let cli = db.clientes.find(c => c.id === cliId);
  if(cli) {
    cli.etapas[index].fluxoMobiliario = checked;
    cli.etapas[index].fluxoEtapa = checked ? 'detalhamento' : false;
    renderMainArea();
  }
}

function changeFluxoEtapa(cliId, index, valor){
  let cli = db.clientes.find(c => c.id === cliId);
  if(cli) {
    cli.etapas[index].fluxoEtapa = valor;
    renderMainArea();
  }
}

function togglePendencia(cliId, pid){
  let cli = db.clientes.find(c => c.id === cliId);
  let p = cli.pendencias.find(item => item.id === pid);
  if(p) { p.done = !p.done; renderMainArea(); }
}

function addPendencia(cliId){
  let txt = document.getElementById('newPendTxt').value;
  if(!txt) return;
  let cli = db.clientes.find(c => c.id === cliId);
  cli.pendencias.push({ id: Date.now(), txt: txt, done: false });
  renderMainArea();
}

function deletePendencia(cliId, pid){
  let cli = db.clientes.find(c => c.id === cliId);
  cli.pendencias = cli.pendencias.filter(item => item.id !== pid);
  renderMainArea();
}

function salvarVisita(cliId){
  let cli = db.clientes.find(c => c.id === cliId);
  cli.visitaData = document.getElementById('vDataInput').value;
  cli.visitaDesc = document.getElementById('vDescInput').value;
  showToast("Relatório de Visita salvo!");
  renderMainArea();
}

// SISTEMA DE VALIDAÇÃO (GATILHO DO CLIENTE)
let contextoValidacao = null;

function abrirModalValidacao(cliId, etapaIndex, decisao){
  contextoValidacao = { cliId, etapaIndex, decisao };
  document.getElementById('mvTitle').innerText = decisao === 'aprovado' ? 'Confirmar Aprovação' : 'Solicitar Ajustes/Alterações';
  document.getElementById('mvFeedback').value = '';
  document.getElementById('modalValidacao').classList.remove('hidden');
}

function fecharModalValidacao(){
  document.getElementById('modalValidacao').classList.add('hidden');
  contextoValidacao = null;
}

function confirmarValidacaoCliente(){
  if(!contextoValidacao) return;
  let { cliId, etapaIndex, decisao } = contextoValidacao;
  let text = document.getElementById('mvFeedback').value;

  let cli = db.clientes.find(c => c.id === cliId);
  if(cli) {
    cli.etapas[etapaIndex].validacao = {
      status: decisao,
      feedback: text || (decisao === 'aprovado' ? 'Etapa validada com sucesso.' : 'Solicitação de modificação cadastrada.'),
      data: new Date().toLocaleDateString('pt-BR')
    };
    
    // Se aprovado, muda o status visual automaticamente
    if(decisao === 'aprovado') {
      cli.etapas[etapaIndex].status = 'concluida';
    } else {
      cli.etapas[etapaIndex].status = 'pendente';
    }

    showToast("Sua decisão foi processada com sucesso!");
    fecharModalValidacao();
    renderMainArea();
  }
}

// INCLUSÃO DE NOVOS CLIENTES (ADMIN)
function goNovoCliente(){
  document.getElementById('mainArea').innerHTML = `
    <div class="fcard">
      <div class="ftitle">Cadastrar Novo Projeto</div>
      <div class="field">
        <label>Nome Completo do Cliente</label>
        <input type="text" id="fNome" placeholder="Ex: Jessica Silva">
      </div>
      <div class="field">
        <label>Identificação da Obra / Endereço</label>
        <input type="text" id="fObra" placeholder="Ex: Studio Gravatá | Unidade 104">
      </div>
      <div class="field">
        <label>Cidade / Estado</label>
        <input type="text" id="fCidade" value="Recife - PE">
      </div>
      <div class="field">
        <label>Token Único de Acesso (Link)</label>
        <input type="text" id="fToken" placeholder="Ex: jessica55">
      </div>
      <div class="fbtns">
        <button class="btn-sm primary" onclick="salvarNovoCliente()">Criar Projeto</button>
        <button class="btn-sm" onclick="renderMainArea()">Cancelar</button>
      </div>
    </div>
  `;
}

function salvarNovoCliente(){
  let nome = document.getElementById('fNome').value;
  let obra = document.getElementById('fObra').value;
  let cidade = document.getElementById('fCidade').value;
  let token = document.getElementById('fToken').value;

  if(!nome || !token) { showToast("Preencha o Nome e o Token do cliente."); return; }

  let novo = {
    id: "cli_" + Date.now(),
    nome: nome,
    obra: obra,
    cidade: cidade,
    token: token,
    visitaData: "",
    visitaDesc: "",
    pendencias: [],
    etapas: [
      { num: "01", nome: "Briefing Inicial", desc: "Estudos preliminares e alinhamento conceitual.", status: "ativa", observacoes: "", historico: "", registroTecnico: "", fluxoMobiliario: false, validacao: { status: "pendente", feedback: "", data: "" }, attachments: [], anexos: [] },
      { num: "02", nome: "Executivo e Detalhamento", desc: "Plantas técnicas finais para obra.", status: "pendente", observacoes: "", historico: "", registroTecnico: "", fluxoMobiliario: false, validacao: { status: "pendente", feedback: "", data: "" }, attachments: [], anexos: [] }
    ]
  };

  db.clientes.push(novo);
  db.selectedClientId = novo.id;
  showToast("Cliente criado com sucesso!");
  renderSystem();
}

// UTILITÁRIOS
function showToast(msg){
  let t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 3000);
}

function copiarLinkPortal(){
  let url = document.getElementById('linkPortal').innerText;
  navigator.clipboard.writeText(url).then(() => {
    showToast("Link exclusivo copiado para a área de transferência!");
  });
}

window.onload = init;
</script>
