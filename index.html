<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Liliane Almeida Arquitetura</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brick:#C1440E;
  --brick-deep:#9B3209;
  --brick-pale:#F5E8E2;
  --ink:#1A1410;
  --ink2:#3D2E26;
  --stone:#F9F6F2;
  --stone2:#EDE8E1;
  --line:#DDD5CC;
  --line2:#C8BDB4;
  --mist:#8C7B70;
  --white:#FFFFFF;
  --green:#3A6B4F;
  --green2:#EAF2EC;
  --blue:#1E3E6E;
  --blue-pale:#EAF0FA;
  --orange:#B86820;
  --orange-pale:#FAF0E0;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--stone);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}

/* ── LOADING CORRIGIDO (SOME SOZINHO SE O JS TRAVAR) ── */
#vLoading{
  position:fixed;inset:0;background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;
  animation: fadeOutContainer 0.5s ease-in-out 2s forwards;
  pointer-events: none;
}
#vLoading .logo-load{
  font-family:'Cormorant Garamond',serif;
  font-size:48px;font-weight:300;letter-spacing:12px;color:var(--white);
  animation:breathe 2s ease-in-out infinite;
}
#vLoading .sub-load{
  font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.4);margin-top:8px;text-transform:uppercase;
}
@keyframes breathe{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes fadeOutContainer{
  0%{opacity:1;visibility:visible}
  99%{opacity:0;visibility:visible}
  100%{opacity:0;visibility:hidden;display:none!important}
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--white);
  padding:12px 24px;border-radius:100px;
  font-size:12px;letter-spacing:.5px;
  z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;
  white-space:nowrap;
}
.toast.on{opacity:1}

/* ── LOGIN ── */
#vLogin{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--ink);padding:24px;
}
.login-wrap{width:100%;max-width:380px;text-align:center}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:300;letter-spacing:16px;color:var(--white);margin-bottom:4px}
.login-brand{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--brick);margin-bottom:4px}
.login-tagline{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:2px;margin-bottom:48px}
.login-field{position:relative;margin-bottom:16px}
.login-field input{
  width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;padding:16px 20px;outline:none;
  border-radius:12px;transition:border-color .2s;
}
.login-field input::placeholder{color:rgba(255,255,255,.3)}
.login-field input:focus{border-color:var(--brick)}
.login-btn{
  width:100%;background:var(--brick);color:var(--white);border:none;border-radius:12px;padding:16px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:1px;cursor:pointer;
  transition:background .2s;margin-top:4px;
}
.login-btn:hover{background:var(--brick-deep)}
.login-err{font-size:12px;color:#FF6B6B;margin-top:12px;opacity:0;transition:opacity .2s}
.login-err.on{opacity:1}

/* ── HEADER ── */
.hdr{
  background:var(--white);border-bottom:1px solid var(--line);
  padding:0 24px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.hdr-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;letter-spacing:8px;color:var(--ink)}
.hdr-logo span{color:var(--brick)}
.hdr-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--mist);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:12px}
.hdr-mode-badge{
