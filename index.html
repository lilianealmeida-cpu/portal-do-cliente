<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8"/>

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Liliane Almeida Arquitetura</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>

*{box-sizing:border-box;margin:0;padding:0}

:root{

--brick:#C1440E;

--brick-deep:#9B3209;

--brick-pale:#F5E8E2;

--ink:#1A1410;

--ink2:#3D2E26;

--stone:#F9F6F2;

--stone2:#EDE8E1;

--line:#DDD5CC;

--line2:#C8BDB4;

--mist:#8C7B70;

--white:#FFFFFF;

--green:#3A6B4F;

--green2:#EAF2EC;

}

html{scroll-behavior:smooth}

body{font-family:'DM Sans',sans-serif;background:var(--stone);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

.hidden{display:none!important}


/* ── LOADING ── */

#vLoading{

position:fixed;inset:0;background:var(--ink);

display:flex;flex-direction:column;align-items:center;justify-content:center;

z-index:999;transition:opacity .5s;

}

#vLoading .logo-load{

font-family:'Cormorant Garamond',serif;

font-size:48px;font-weight:300;letter-spacing:12px;color:var(--white);

animation:breathe 2s ease-in-out infinite;

}

#vLoading .sub-load{

font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.4);margin-top:8px;text-transform:uppercase;

}

@keyframes breathe{0%,100%{opacity:.3}50%{opacity:1}}


/* ── TOAST ── */

.toast{

position:fixed;bottom:28px;left:50%;transform:translateX(-50%);

background:var(--ink);color:var(--white);

padding:12px 24px;border-radius:100px;

font-size:12px;letter-spacing:.5px;

z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;

white-space:nowrap;

}

.toast.on{opacity:1}


/* ── LOGIN ── */

#vLogin{

min-height:100vh;display:flex;align-items:center;justify-content:center;

background:var(--ink);padding:24px;

}

.login-wrap{

width:100%;max-width:380px;text-align:center;

}

.login-logo{

font-family:'Cormorant Garamond',serif;

font-size:56px;font-weight:300;letter-spacing:16px;color:var(--white);

margin-bottom:4px;

}

.login-brand{

font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--brick);

margin-bottom:4px;

}

.login-tagline{

font-size:11px;color:rgba(255,255,255,.3);letter-spacing:2px;margin-bottom:48px;

}

.login-field{

position:relative;margin-bottom:16px;

}

.login-field input{

width:100%;background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.12);

color:var(--white);font-family:'DM Sans',sans-serif;

font-size:14px;padding:16px 20px;outline:none;

border-radius:12px;transition:border-color .2s;

}

.login-field input::placeholder{color:rgba(255,255,255,.3)}

.login-field input:focus{border-color:var(--brick)}

.login-btn{

width:100%;background:var(--brick);color:var(--white);

border:none;border-radius:12px;padding:16px;

font-family:'DM Sans',sans-serif;font-size:13px;

font-weight:500;letter-spacing:1px;cursor:pointer;

transition:background .2s;margin-top:4px;

}

.login-btn:hover{background:var(--brick-deep)}

.login-err{font-size:12px;color:#FF6B6B;margin-top:12px;opacity:0;transition:opacity .2s}

.login-err.on{opacity:1}


/* ── HEADER ── */

.hdr{

background:var(--white);border-bottom:1px solid var(--line);

padding:0 24px;height:60px;

display:flex;align-items:center;justify-content:space-between;

position:sticky;top:0;z-index:100;

}

.hdr-logo{

font-family:'Cormorant Garamond',serif;

font-size:22px;font-weight:300;letter-spacing:8px;color:var(--ink);

}

.hdr-logo span{color:var(--brick)}

.hdr-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--mist);margin-top:1px}

.hdr-right{display:flex;align-items:center;gap:12px}

.btn-exit{

background:none;border:1px solid var(--line2);color:var(--mist);

font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:1px;

padding:7px 16px;border-radius:100px;cursor:pointer;transition:all .2s;

}

.btn-exit:hover{border-color:var(--brick);color:var(--brick)}


/* ── ADMIN BODY ── */

.admin-wrap{display:flex;min-height:calc(100vh - 60px)}


/* ── SIDEBAR ── */

.sidebar{

width:280px;background:var(--white);border-right:1px solid var(--line);

padding:24px 16px;flex-shrink:0;overflow-y:auto;

}

.sidebar-label{

font-size:9px;letter-spacing:3px;text-transform:uppercase;

color:var(--mist);margin-bottom:12px;padding:0 8px;

}

.cli-item{

display:flex;align-items:center;gap:12px;

padding:11px 12px;border-radius:10px;cursor:pointer;

transition:background .15s;margin-bottom:2px;

}

.cli-item:hover{background:var(--stone)}

.cli-item.on{background:var(--brick-pale)}

.cli-av{

width:36px;height:36px;border-radius:50%;

background:var(--brick);color:var(--white);

display:flex;align-items:center;justify-content:center;

font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;

flex-shrink:0;

}

.cli-info{overflow:hidden}

.cli-nome{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.cli-obra{font-size:11px;color:var(--mist);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.btn-add-cli{

width:100%;margin-top:12px;padding:10px;

border:1.5px dashed var(--line2);background:none;

border-radius:10px;color:var(--mist);

font-family:'DM Sans',sans-serif;font-size:12px;

cursor:pointer;transition:all .2s;

}

.btn-add-cli:hover{border-color:var(--brick);color:var(--brick)}


/* ── MAIN ── */

.main{flex:1;padding:32px;overflow-y:auto;max-width:820px}


/* ── CARDS ── */

.hero-card{

background:var(--white);border-radius:16px;

padding:28px;margin-bottom:24px;

box-shadow:0 1px 3px rgba(0,0,0,.06);

}

.cli-header{display:flex;gap:16px;align-items:flex-start;margin-bottom:20px}

.cli-av-lg{

width:56px;height:56px;border-radius:50%;

background:var(--brick);color:var(--white);

display:flex;align-items:center;justify-content:center;

font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;

flex-shrink:0;

}

.cli-nome-lg{

font-family:'Cormorant Garamond',serif;

font-size:26px;font-weight:400;margin-bottom:2px;

}

.cli-obra-lg{

font-size:10px;letter-spacing:2px;text-transform:uppercase;

color:var(--brick);margin-bottom:10px;

}

.cli-dados{display:flex;flex-wrap:wrap;gap:12px}

.cli-dado{font-size:12px;color:var(--mist);display:flex;align-items:center;gap:6px}

.link-row{

display:flex;align-items:center;gap:10px;

padding-top:16px;border-top:1px solid var(--line);

flex-wrap:wrap;

}

.link-url{

flex:1;font-size:11px;font-family:monospace;

background:var(--stone);border:1px solid var(--line);

padding:8px 12px;border-radius:8px;

color:var(--mist);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;

}

.btn-copy{

background:var(--brick);color:var(--white);

border:none;border-radius:8px;padding:8px 16px;

font-family:'DM Sans',sans-serif;font-size:11px;

letter-spacing:.5px;cursor:pointer;transition:background .2s;white-space:nowrap;

}

.btn-copy:hover{background:var(--brick-deep)}


/* ── TABS ── */

.tabs{

display:flex;border-bottom:1px solid var(--line);

margin-bottom:24px;overflow-x:auto;gap:0;

}

.tab{

padding:12px 18px;font-size:11px;letter-spacing:1.5px;

text-transform:uppercase;background:none;border:none;

border-bottom:2px solid transparent;color:var(--mist);

font-family:'DM Sans',sans-serif;cursor:pointer;

margin-bottom:-1px;white-space:nowrap;transition:all .2s;

}

.tab.on{color:var(--brick);border-bottom-color:var(--brick)}

.tab:hover{color:var(--ink)}


/* ── CONTENT ── */

.section-head{

display:flex;justify-content:space-between;align-items:center;

margin-bottom:16px;

}

.section-title{

font-family:'Cormorant Garamond',serif;

font-size:20px;font-weight:400;

}

.btn-sm{

background:none;border:1px solid var(--line2);

color:var(--mist);font-family:'DM Sans',sans-serif;

font-size:11px;letter-spacing:.5px;padding:7px 14px;

border-radius:100px;cursor:pointer;transition:all .2s;

}

.btn-sm:hover{border-color:var(--brick);color:var(--brick)}

.btn-sm.primary{background:var(--brick);border-color:var(--brick);color:var(--white)}

.btn-sm.primary:hover{background:var(--brick-deep)}

.btn-sm.danger{border-color:#FFCCC7;color:#C0392B}


/* ── ARQUIVO CARD ── */

.arq-card{

background:var(--white);border:1px solid var(--line);

border-radius:12px;padding:18px 20px;margin-bottom:10px;

transition:box-shadow .2s;

}

.arq-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}

.arq-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;flex-wrap:wrap}

.arq-tl{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

.badge{

font-size:9px;letter-spacing:1.5px;text-transform:uppercase;

padding:3px 10px;border-radius:100px;

}

.arq-titulo{font-size:15px;font-weight:500}

.arq-data{font-size:10px;color:var(--mist)}

.arq-texto{font-size:13px;color:var(--ink2);line-height:1.8;white-space:pre-wrap}


/* ── PENDÊNCIAS ── */

.pend-input-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}

.pend-input-row input{

flex:1;min-width:200px;background:var(--white);

border:1px solid var(--line);color:var(--ink);

font-family:'DM Sans',sans-serif;font-size:13px;

padding:11px 14px;outline:none;border-radius:10px;

transition:border-color .2s;

}

.pend-input-row input:focus{border-color:var(--brick)}

.pend-item{

display:flex;align-items:center;gap:12px;

background:var(--white);border:1px solid var(--line);

border-radius:10px;padding:14px 16px;margin-bottom:8px;

transition:background .15s;

}

.pend-item.done{background:var(--stone2)}

.pend-check{

width:20px;height:20px;border:2px solid var(--line2);

border-radius:6px;cursor:pointer;display:flex;

align-items:center;justify-content:center;flex-shrink:0;

font-size:11px;color:var(--white);background:var(--white);

transition:all .2s;

}

.pend-item.done .pend-check{background:var(--green);border-color:var(--green)}

.pend-txt{flex:1;font-size:13px;color:var(--ink2)}

.pend-item.done .pend-txt{color:var(--mist);text-decoration:line-through}

.pend-meta{font-size:10px;color:var(--mist);white-space:nowrap}

.pend-del{background:none;border:none;color:var(--mist);font-size:14px;padding:2px 6px;cursor:pointer}


/* ── ETAPAS ── */

.etapa-item{

display:flex;gap:16px;align-items:flex-start;

padding:20px 0;border-bottom:1px solid var(--line);

}

.etapa-item:last-child{border-bottom:none}

.etapa-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0}

.etapa-circle{

width:40px;height:40px;border-radius:50%;

border:2px solid var(--line2);

display:flex;align-items:center;justify-content:center;

font-size:14px;background:var(--white);color:var(--mist);

transition:all .3s;

}

.etapa-item.concluida .etapa-circle{background:var(--green);border-color:var(--green);color:var(--white)}

.etapa-item.ativa .etapa-circle{background:var(--brick);border-color:var(--brick);color:var(--white)}

.etapa-num{font-size:9px;color:var(--mist);margin-top:4px;letter-spacing:1px}

.etapa-nome{font-size:15px;font-weight:500;margin-bottom:2px}

.etapa-desc{font-size:11px;color:var(--mist);margin-bottom:8px}

.etapa-pill{

font-size:9px;letter-spacing:2px;text-transform:uppercase;

padding:3px 10px;border-radius:100px;display:inline-block;

}

.etapa-item.concluida .etapa-pill{background:var(--green2);color:var(--green);border:1px solid #C0DDC9}

.etapa-item.ativa .etapa-pill{background:var(--brick-pale);color:var(--brick);border:1px solid #EDCFC4}

.etapa-item .etapa-pill{background:var(--stone2);color:var(--mist);border:1px solid var(--line)}

.etapa-actions{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;flex-shrink:0;padding-top:2px}

.etapa-btn{

padding:6px 14px;font-size:10px;letter-spacing:.5px;

font-family:'DM Sans',sans-serif;cursor:pointer;

border-radius:100px;transition:all .2s;

border:1.5px solid var(--line2);background:none;color:var(--mist);

}

.etapa-btn.btn-and{border-color:var(--brick);color:var(--brick)}

.etapa-btn.btn-and.on{background:var(--brick);color:var(--white)}

.etapa-btn.btn-ok{border-color:var(--green);color:var(--green)}

.etapa-btn.btn-ok.on{background:var(--green);color:var(--white)}

.etapa-btn.btn-pend.on{background:var(--stone2);color:var(--ink)}

.etapa-obs-wrap{margin-top:10px}

.etapa-obs-wrap textarea{

width:100%;background:var(--stone);border:1px solid var(--line);

color:var(--ink);font-family:'DM Sans',sans-serif;font-size:12px;

padding:10px 12px;outline:none;resize:vertical;line-height:1.8;

border-radius:8px;transition:border-color .2s;

}

.etapa-obs-wrap textarea:focus{border-color:var(--brick);background:var(--white)}

.etapa-link-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center}

.etapa-link-row input{

flex:1;min-width:140px;background:var(--stone);border:1px solid var(--line);

color:var(--ink);font-family:'DM Sans',sans-serif;font-size:12px;

padding:7px 10px;outline:none;border-radius:8px;

}

.etapa-link-row input:focus{border-color:var(--brick)}

.etapa-links{display:flex;flex-direction:column;gap:5px;margin-top:6px}


/* ── FLUXO BASE MOBILIÁRIO ── */

.fluxo-wrap{margin-top:16px;display:flex;flex-direction:column;gap:0}

.fluxo-item{display:flex;gap:14px;align-items:flex-start;padding:14px 0;position:relative}

.fluxo-item:not(:last-child)::after{content:'';position:absolute;left:15px;top:44px;bottom:0;width:2px;background:var(--line)}

.fluxo-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:2px solid var(--line);background:var(--white);color:var(--mist);z-index:1}

.fluxo-dot.verde{background:var(--green);border-color:var(--green);color:var(--white)}

.fluxo-dot.azul{background:#1E3E6E;border-color:#1E3E6E;color:var(--white)}

.fluxo-dot.laranja{background:#B86820;border-color:#B86820;color:var(--white)}

.fluxo-dot.pausa{background:#7A5828;border-color:#7A5828;color:var(--white)}

.fluxo-dot.cinza{background:var(--stone2);border-color:var(--line2);color:var(--mist)}

.fluxo-body{flex:1;padding-top:5px}

.fluxo-label{font-size:13px;font-weight:500;color:var(--ink);line-height:1.4}

.fluxo-sub{font-size:11px;color:var(--mist);margin-top:3px;line-height:1.6}

.fluxo-pill{display:inline-block;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:100px;margin-top:6px}

.fluxo-pill.azul{background:#EAF0FA;color:#1E3E6E;border:1px solid #C0CDE0}

.fluxo-pill.verde{background:var(--green2);color:var(--green);border:1px solid #C0DDC9}

.fluxo-pill.laranja{background:#FAF0E0;color:#B86820;border:1px solid #E8D5AA}

.fluxo-pill.pausa{background:#F5EDE0;color:#7A5828;border:1px solid #DDD0B8}

.fluxo-opcoes{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

.fluxo-btn{padding:8px 16px;font-size:11px;letter-spacing:.3px;font-family:'DM Sans',sans-serif;cursor:pointer;border-radius:100px;transition:all .2s;border:1.5px solid var(--line2);background:var(--white);color:var(--ink2)}

.fluxo-btn:hover{border-color:var(--brick);color:var(--brick)}

.fluxo-btn.sel-sim{border-color:var(--green);background:var(--green);color:var(--white)}

.fluxo-btn.sel-nao{border-color:var(--brick);background:var(--brick);color:var(--white)}

.fluxo-aviso{margin-top:12px;padding:12px 14px;background:#FAF5ED;border-left:3px solid #B86820;border-radius:0 8px 8px 0;font-size:11px;color:#7A5828;line-height:1.7}

.fluxo-alinhamento{margin-top:12px;padding:14px;background:var(--stone);border:1px solid var(--line);border-radius:10px}

.fluxo-alinhamento .al-titulo{font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--ink2);margin-bottom:6px}

.fluxo-alinhamento .al-desc{font-size:11px;color:var(--mist);line-height:1.7}

.fluxo-pausa-box{margin-top:12px;padding:14px;background:#FDF5E8;border:1.5px solid #E8D5AA;border-radius:10px}

.fluxo-pausa-box .pb-titulo{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#7A5828;margin-bottom:4px}

.fluxo-pausa-box .pb-desc{font-size:11px;color:#9C7840;line-height:1.7}

.etapa-link-item{

display:flex;align-items:center;gap:8px;

background:var(--stone2);border:1px solid var(--line);

padding:6px 10px;border-radius:8px;

}

.etapa-link-item a{font-size:12px;color:var(--brick);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}


/* ── VISITA ── */

.visita-card{

background:linear-gradient(135deg,var(--brick) 0%,var(--brick-deep) 100%);

border-radius:16px;padding:28px;margin-bottom:20px;color:var(--white);

}

.visita-lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;opacity:.7;margin-bottom:8px}

.visita-data{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;margin-bottom:4px}

.visita-desc{font-size:13px;opacity:.8}

.visita-form{

background:var(--white);border:1px solid var(--line);

border-radius:12px;padding:24px;margin-bottom:20px;

}

.visita-form label{

display:block;font-size:9px;letter-spacing:2px;

text-transform:uppercase;color:var(--brick);margin-bottom:6px;

}

.visita-form input{

width:100%;background:var(--stone);border:1px solid var(--line);

color:var(--ink);font-family:'DM Sans',sans-serif;font-size:13px;

padding:10px 12px;outline:none;border-radius:8px;margin-bottom:14px;

transition:border-color .2s;

}

.visita-form input:focus{border-color:var(--brick)}


/* ── LINKS ── */

.link-item{

background:var(--white);border:1px solid var(--line);

border-radius:10px;padding:14px 16px;

display:flex;align-items:center;gap:12px;margin-bottom:8px;

}

.link-cat-label{

font-size:9px;letter-spacing:2px;text-transform:uppercase;

margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--line);

}


/* ── ENTREGAS ── */

.ent-bloco{

background:var(--white);border:1px solid var(--line);

border-radius:12px;padding:16px 18px;margin-bottom:10px;

}

.ent-obs{

background:var(--stone);border-radius:8px;

padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--mist);

}

.ent-obs textarea{

width:100%;background:var(--stone);border:none;

color:var(--ink);font-family:'DM Sans',sans-serif;

font-size:12px;padding:0;outline:none;resize:vertical;line-height:1.7;

}

.ent-nome-el{font-size:14px;font-weight:500;margin-bottom:4px}

.ent-nome-el input{

width:100%;background:var(--stone);border:1px solid var(--line);

color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;

padding:5px 10px;outline:none;border-radius:6px;margin-bottom:4px;

}

.ent-item-obs{font-size:11px;color:var(--mist);margin-bottom:8px;line-height:1.6}

.ent-item-obs input{

width:100%;background:var(--stone);border:1px solid var(--line);

color:var(--ink);font-family:'DM Sans',sans-serif;font-size:11px;

padding:5px 10px;outline:none;border-radius:6px;

}

.ent-status-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}

.ent-status{

padding:5px 12px;font-size:10px;letter-spacing:.5px;

border:1px solid var(--line2);border-radius:100px;

background:none;color:var(--mist);cursor:pointer;

font-family:'DM Sans',sans-serif;transition:all .15s;

}

.ent-status:hover{border-color:var(--brick);color:var(--brick)}

.ent-status.on{background:var(--brick-pale);border-color:var(--brick);color:var(--brick)}

.ent-final{font-size:10px;color:var(--brick);font-style:italic;margin-top:6px}

.ent-add{

width:100%;border:1.5px dashed var(--line2);padding:10px;

font-size:11px;color:var(--mist);background:none;cursor:pointer;

font-family:'DM Sans',sans-serif;margin-top:8px;

letter-spacing:.5px;border-radius:10px;transition:all .2s;

}

.ent-add:hover{border-color:var(--brick);color:var(--brick);background:var(--brick-pale)}

.ent-tipo-sel{

font-size:10px;border:1px solid var(--line);color:var(--mist);

padding:3px 8px;font-family:'DM Sans',sans-serif;

background:var(--stone);border-radius:6px;cursor:pointer;

}

.ent-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}

.bicon{background:none;border:none;color:var(--mist);font-size:14px;padding:2px 6px;cursor:pointer}


/* ── FORM ── */

.fcard{

background:var(--white);border-radius:16px;

padding:32px;max-width:520px;

box-shadow:0 1px 3px rgba(0,0,0,.06);

}

.ftitle{

font-family:'Cormorant Garamond',serif;

font-size:24px;font-weight:400;margin-bottom:24px;

}

.field{margin-bottom:18px}

.field label{

display:block;font-size:9px;letter-spacing:2px;

text-transform:uppercase;color:var(--brick);margin-bottom:6px;

}

.field input,.field textarea{

width:100%;background:var(--stone);border:1px solid var(--line);

color:var(--ink);font-family:'DM Sans',sans-serif;font-size:13px;

padding:11px 14px;outline:none;border-radius:10px;transition:border-color .2s;

}

.field input:focus,.field textarea:focus{border-color:var(--brick);background:var(--white)}

.field textarea{resize:vertical;line-height:1.8}

.f2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

@media(max-width:500px){.f2{grid-template-columns:1fr}}

.fbtns{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap}

.err-msg{font-size:11px;color:#C0392B;margin-top:8px}

.tgroup{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}

.tbtn{

background:none;border:1px solid var(--line);color:var(--mist);

padding:6px 14px;font-size:10px;letter-spacing:1px;

text-transform:uppercase;font-family:'DM Sans',sans-serif;

border-radius:100px;cursor:pointer;transition:all .2s;

}

.tbtn.on{background:var(--brick-pale);border-color:var(--brick);color:var(--brick)}


/* ── EMPTY ── */

.empty{text-align:center;padding:56px 20px;color:var(--mist)}

.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}

.empty-txt{font-size:14px;margin-bottom:4px}

.empty-sub{font-size:12px;opacity:.7}


/* ── TOPBAR ── */

.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}

.bback{

background:none;border:none;color:var(--mist);

font-size:12px;letter-spacing:1px;text-transform:uppercase;

font-family:'DM Sans',sans-serif;cursor:pointer;padding:0;

display:flex;align-items:center;gap:6px;

}

.bback:hover{color:var(--brick)}


/* ── GRID CLIENTES ── */

.cli-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}

.cli-card{

background:var(--white);border:1px solid var(--line);

border-radius:14px;padding:20px;cursor:pointer;

transition:border-color .2s,box-shadow .2s;

}

.cli-card:hover{border-color:var(--brick);box-shadow:0 4px 20px rgba(193,68,14,.08)}

.cli-card-av{

width:40px;height:40px;border-radius:50%;

background:var(--brick);color:var(--white);

display:flex;align-items:center;justify-content:center;

font-family:'Cormorant Garamond',serif;font-size:18px;

margin-bottom:12px;

}

.cli-card-nome{font-size:16px;font-weight:500;margin-bottom:2px}

.cli-card-obra{font-size:11px;color:var(--mist);margin-bottom:14px}

.cli-card-footer{

display:flex;justify-content:space-between;

font-size:10px;color:var(--mist);

border-top:1px solid var(--line);padding-top:10px;

}


/* ── MODAL ── */

.overlay{

position:fixed;inset:0;background:rgba(26,20,16,.5);

display:flex;align-items:center;justify-content:center;

z-index:200;backdrop-filter:blur(4px);padding:20px;

}

.modal{

background:var(--white);border-radius:16px;

padding:28px;max-width:380px;width:100%;

box-shadow:0 20px 60px rgba(0,0,0,.15);

}

.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;margin-bottom:8px}

.modal-sub{font-size:13px;color:var(--mist);margin-bottom:24px;line-height:1.7}

.modal-btns{display:flex;gap:10px;justify-content:flex-end}


/* ── PÚBLICO ── */

#vPub{background:var(--stone)}

.pub-hdr{

background:var(--ink);padding:20px 24px;

display:flex;align-items:center;justify-content:space-between;

}

.pub-logo{

font-family:'Cormorant Garamond',serif;

font-size:20px;font-weight:300;letter-spacing:8px;color:var(--white);

}

.pub-logo span{color:var(--brick)}

.pub-wrap{max-width:680px;margin:0 auto;padding:32px 20px}

.pub-hero{

background:var(--white);border-radius:20px;

padding:36px;margin-bottom:24px;text-align:center;

box-shadow:0 2px 12px rgba(0,0,0,.06);

}

.pub-monogram{

width:72px;height:72px;border-radius:50%;

background:var(--ink);color:var(--white);

display:flex;align-items:center;justify-content:center;

font-family:'Cormorant Garamond',serif;font-size:28px;letter-spacing:4px;

margin:0 auto 20px;

}

.pub-greet{

font-family:'Cormorant Garamond',serif;

font-size:32px;font-weight:300;margin-bottom:6px;

}

.pub-proj{

font-size:10px;letter-spacing:3px;text-transform:uppercase;

color:var(--brick);margin-bottom:16px;

}

.pub-div{border:none;border-top:1px solid var(--line);margin:20px auto;max-width:48px}

.pub-sig{font-size:13px;font-style:italic;color:var(--mist);margin-bottom:2px}

.pub-sig2{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--mist)}


.pub-etapa{

display:flex;gap:16px;align-items:flex-start;

padding:18px 0;border-bottom:1px solid var(--line);

}

.pub-etapa:last-child{border-bottom:none}

.pub-circle{

width:36px;height:36px;border-radius:50%;

border:2px solid var(--line2);

display:flex;align-items:center;justify-content:center;

font-size:13px;flex-shrink:0;background:var(--white);color:var(--mist);

}

.pub-etapa.concluida .pub-circle{background:var(--green);border-color:var(--green);color:var(--white)}

.pub-etapa.ativa .pub-circle{background:var(--brick);border-color:var(--brick);color:var(--white)}

.pub-etapa-nome{font-size:14px;font-weight:500;margin-bottom:4px}

.pub-etapa-pill{

font-size:9px;letter-spacing:2px;text-transform:uppercase;

padding:3px 10px;border-radius:100px;display:inline-block;

background:var(--stone2);color:var(--mist);border:1px solid var(--line);

}

.pub-etapa.concluida .pub-etapa-pill{background:var(--green2);color:var(--green);border-color:#C0DDC9}

.pub-etapa.ativa .pub-etapa-pill{background:var(--brick-pale);color:var(--brick);border-color:#EDCFC4}


.pub-visita{

background:linear-gradient(135deg,var(--brick) 0%,var(--brick-deep) 100%);

border-radius:16px;padding:24px;margin-bottom:20px;color:var(--white);

}

.pub-visita-lbl{font-size:9px;letter-spacing:3px;text-transform:uppercase;opacity:.7;margin-bottom:6px}

.pub-visita-data{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;margin-bottom:4px}

.pub-visita-desc{font-size:13px;opacity:.8}


/* ── CROW ── */

.crow{display:flex;gap:8px;align-items:center}


/* ── RESPONSIVE ── */

@media(max-width:720px){

.sidebar{display:none}

.admin-wrap{flex-direction:column}

.main{padding:16px}

.pub-hero{padding:24px 20px}

}

</style>

</head>
